{% extends 'base.html' %}
{% block content %}
<section>
  <h2>Audit Log</h2>
  <form method="get" action="{{ url_for('audit') }}" class="inline-form">
    <label for="filter-action">Filter by Action</label>
    <select id="filter-action" name="action">
      <option value="all" {% if action_filter == 'all' %}selected{% endif %}>all</option>
      {% for action in actions %}
        <option value="{{ action }}" {% if action_filter == action %}selected{% endif %}>{{ action }}</option>
      {% endfor %}
    </select>
    <button type="submit">Apply Filter</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Timestamp</th>
        <th>Action</th>
        <th>Target</th>
        <th>Performed By</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.timestamp }}</td>
        <td>{{ row.action }}</td>
        <td>{{ row.target_email }}</td>
        <td>{{ row.performed_by }}</td>
        <td>{{ row.details }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
